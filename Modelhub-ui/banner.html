<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ModelHub - 所有模型服务</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%234F6EF7'/><text x='50' y='68' font-size='52' font-weight='bold' text-anchor='middle' fill='white'>M</text></svg>">
<style>
:root {
  --bg: #f7f8fa;
  --bg-white: #ffffff;
  --text-primary: #1d2129;
  --text-secondary: #4e5969;
  --text-tertiary: #86909c;
  --text-placeholder: #c9cdd4;
  --border: #e5e6eb;
  --blue: #4F6EF7;
  --blue-hover: #3D5BD9;
  --blue-light: #f0f3ff;
  --blue-bg: #e8edff;
  --orange: #FF7D00;
  --orange-light: #fff7e8;
  --green: #00b42a;
  --green-light: #e8ffea;
  --radius: 12px;
  --radius-sm: 8px;
  --radius-lg: 16px;
  --shadow-sm: 0 1px 2px rgba(0,0,0,.04);
  --shadow: 0 2px 8px rgba(0,0,0,.06);
  --shadow-md: 0 4px 16px rgba(0,0,0,.08);
  --shadow-hover: 0 8px 24px rgba(0,0,0,.1);
  --transition: all .2s ease;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text-primary);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ========== Navbar ========== */
.navbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  height: 60px;
  background: rgba(255,255,255,.88);
  backdrop-filter: blur(20px) saturate(180%);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 48px;
}
.nav-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  color: var(--text-primary);
}
.nav-brand-icon {
  width: 32px; height: 32px;
  border-radius: 8px;
  background: var(--blue);
  display: flex;
  align-items: center;
  justify-content: center;
}
.nav-brand-icon svg { width: 18px; height: 18px; }
.nav-brand-text {
  font-size: 17px;
  font-weight: 700;
  letter-spacing: -.3px;
}
.nav-center {
  flex: 1;
  display: flex;
  justify-content: center;
  gap: 36px;
}
.nav-center a {
  font-size: 14px;
  color: var(--text-tertiary);
  text-decoration: none;
  transition: var(--transition);
  position: relative;
  padding: 4px 0;
}
.nav-center a:hover { color: var(--text-primary); }
.nav-center a.active {
  color: var(--blue);
  font-weight: 600;
}
.nav-center a.active::after {
  content: '';
  position: absolute;
  bottom: -18px;
  left: 50%; transform: translateX(-50%);
  width: 20px; height: 2px;
  background: var(--blue);
  border-radius: 1px;
}
.nav-right {
  display: flex;
  align-items: center;
  gap: 12px;
}
.nav-key-indicator {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #c9cdd4;
  transition: background .3s;
}
.nav-key-indicator.ok { background: var(--green); }

/* ========== Hero Section ========== */
.hero {
  padding: 100px 48px 0;
  max-width: 900px;
  margin: 0 auto;
  text-align: center;
}
.hero-brand {
  display: inline-flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 28px;
}
.hero-brand-icon {
  width: 56px; height: 56px;
  border-radius: 14px;
  background: var(--blue);
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 16px rgba(79,110,247,.3);
}
.hero-brand-icon svg { width: 28px; height: 28px; }
.hero h1 {
  font-size: 36px;
  font-weight: 800;
  letter-spacing: -.5px;
  line-height: 1.3;
  color: var(--text-primary);
  margin-bottom: 12px;
}
.hero-desc {
  font-size: 15px;
  color: var(--text-tertiary);
  line-height: 1.7;
  max-width: 520px;
  margin: 0 auto 36px;
}

/* ========== Search Bar ========== */
.search-wrap {
  max-width: 560px;
  margin: 0 auto 32px;
  position: relative;
}
.search-bar {
  width: 100%;
  height: 48px;
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 0 20px 0 48px;
  font-size: 14px;
  color: var(--text-primary);
  background: var(--bg-white);
  outline: none;
  transition: var(--transition);
  font-family: inherit;
}
.search-bar::placeholder { color: var(--text-placeholder); }
.search-bar:focus {
  border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(79,110,247,.12);
}
.search-icon {
  position: absolute;
  left: 18px;
  top: 50%; transform: translateY(-50%);
  width: 18px; height: 18px;
  color: var(--text-placeholder);
  pointer-events: none;
}

/* ========== Category Tags ========== */
.category-bar {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-bottom: 40px;
  flex-wrap: wrap;
}
.cat-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  height: 36px;
  padding: 0 18px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--bg-white);
  color: var(--text-secondary);
  transition: var(--transition);
  user-select: none;
}
.cat-tag:hover {
  border-color: var(--blue);
  color: var(--blue);
  background: var(--blue-light);
}
.cat-tag.active {
  background: var(--blue);
  color: #fff;
  border-color: var(--blue);
}
.cat-count {
  font-size: 11px;
  opacity: .7;
}

/* ========== Main Container ========== */
.main {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 48px 100px;
}

/* ========== Stats ========== */
.stats-row {
  display: flex;
  gap: 16px;
  margin-bottom: 36px;
}
.stat-card {
  flex: 1;
  background: var(--bg-white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 24px;
  transition: var(--transition);
}
.stat-card:hover {
  border-color: var(--blue);
  box-shadow: var(--shadow);
}
.stat-num {
  font-size: 28px;
  font-weight: 800;
  color: var(--blue);
  letter-spacing: -1px;
}
.stat-label {
  font-size: 13px;
  color: var(--text-tertiary);
  margin-top: 2px;
}

/* ========== Model Grid ========== */
.model-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 20px;
}

/* ========== Model Card ========== */
.model-card {
  background: var(--bg-white);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 24px;
  cursor: pointer;
  transition: var(--transition);
  text-decoration: none;
  color: inherit;
  display: flex;
  flex-direction: column;
  position: relative;
}
.model-card:hover {
  border-color: transparent;
  box-shadow: var(--shadow-hover);
  transform: translateY(-3px);
}
.model-card.hidden { display: none; }

.card-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 14px;
}
.card-icon-wrap {
  display: flex;
  align-items: center;
  gap: 12px;
}
.card-icon {
  width: 44px; height: 44px;
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 700;
  flex-shrink: 0;
}
.card-icon.image { background: #e8f4e8; color: #3d9a3d; }
.card-icon.video { background: #fef3e2; color: #e89a3c; }
.card-icon.audio { background: #f3e8ff; color: #9b59b6; }
.card-icon.text  { background: var(--blue-light); color: var(--blue); }
.card-icon.api   { background: #fff0f0; color: #e74c3c; }
.card-icon.util  { background: #e8f8f5; color: #1abc9c; }

.card-title {
  font-size: 16px;
  font-weight: 700;
  color: var(--text-primary);
  line-height: 1.3;
}
.card-subtitle {
  font-size: 12px;
  color: var(--text-tertiary);
  margin-top: 2px;
}

.card-badge {
  font-size: 11px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 999px;
  flex-shrink: 0;
  margin-top: 2px;
}
.card-badge.free {
  background: var(--green-light);
  color: var(--green);
}
.card-badge.paid {
  background: var(--orange-light);
  color: var(--orange);
}

.card-desc {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.7;
  margin-bottom: 20px;
  flex: 1;
}

.card-bottom {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-top: 16px;
  border-top: 1px solid #f2f3f5;
}
.card-meta {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.card-price {
  font-size: 14px;
  font-weight: 700;
  color: var(--text-primary);
}
.card-price.free { color: var(--green); }
.card-info {
  font-size: 11px;
  color: var(--text-tertiary);
}
.card-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  height: 34px;
  padding: 0 18px;
  border-radius: 999px;
  background: var(--blue);
  color: #fff;
  font-size: 13px;
  font-weight: 500;
  text-decoration: none;
  border: none;
  cursor: pointer;
  transition: var(--transition);
  font-family: inherit;
}
.card-btn:hover {
  background: var(--blue-hover);
  box-shadow: 0 4px 12px rgba(79,110,247,.3);
}
.card-btn svg { width: 14px; height: 14px; }

/* ========== Empty State ========== */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-tertiary);
  font-size: 14px;
  grid-column: 1 / -1;
}
.empty-state-icon {
  font-size: 40px;
  margin-bottom: 12px;
  opacity: .4;
}

/* ========== Section ========== */
.section-label {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 16px;
  padding-left: 4px;
}

/* ========== Key Bar ========== */
.key-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 100;
  height: 56px;
  background: rgba(255,255,255,.92);
  backdrop-filter: blur(20px) saturate(180%);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 48px;
  gap: 12px;
}
.key-bar label {
  font-size: 13px;
  color: var(--text-secondary);
  white-space: nowrap;
  font-weight: 500;
}
.key-bar input {
  flex: 1;
  max-width: 360px;
  height: 36px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 0 14px;
  color: var(--text-primary);
  font-size: 13px;
  font-family: 'SF Mono', Monaco, Consolas, monospace;
  outline: none;
  transition: var(--transition);
}
.key-bar input:focus {
  border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(79,110,247,.1);
}
.key-status {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #c9cdd4;
  flex-shrink: 0;
  transition: background .3s;
}
.key-status.ok { background: var(--green); }
.key-save-btn {
  height: 36px;
  padding: 0 20px;
  background: var(--blue);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: var(--transition);
  font-family: inherit;
}
.key-save-btn:hover { background: var(--blue-hover); }

body { padding-bottom: 56px; }

/* ========== Toast ========== */
.toast {
  position: fixed;
  bottom: 76px;
  left: 50%;
  transform: translateX(-50%);
  padding: 10px 22px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  z-index: 999;
  opacity: 0;
  transition: opacity .3s;
  pointer-events: none;
  white-space: nowrap;
  backdrop-filter: blur(12px);
}
.toast.show { opacity: 1; }
.toast.success {
  background: rgba(0,180,42,.1);
  color: var(--green);
  border: 1px solid rgba(0,180,42,.2);
}
.toast.error {
  background: rgba(231,76,60,.1);
  color: #e74c3c;
  border: 1px solid rgba(231,76,60,.2);
}

/* ========== Animations ========== */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
.hero { animation: fadeUp .5s ease-out; }
.model-card { animation: fadeUp .4s ease-out both; }
.model-card:nth-child(1) { animation-delay: .05s; }
.model-card:nth-child(2) { animation-delay: .1s; }
.model-card:nth-child(3) { animation-delay: .15s; }
.model-card:nth-child(4) { animation-delay: .2s; }
.model-card:nth-child(5) { animation-delay: .25s; }
.model-card:nth-child(6) { animation-delay: .3s; }

/* ========== Responsive ========== */
@media (max-width: 768px) {
  .navbar { padding: 0 20px; }
  .nav-center { gap: 20px; }
  .hero { padding: 90px 20px 0; }
  .hero h1 { font-size: 26px; }
  .main { padding: 0 20px 80px; }
  .model-grid { grid-template-columns: 1fr; }
  .stats-row { flex-wrap: wrap; }
  .stat-card { min-width: calc(50% - 8px); }
  .key-bar { padding: 0 20px; }
}
</style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <a class="nav-brand" href="index.html">
    <div class="nav-brand-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
      </svg>
    </div>
    <span class="nav-brand-text">ModelHub</span>
  </a>
  <div class="nav-center">
    <a href="#models" class="active">模型</a>
    <a href="api_docs/index.html">接口文档</a>
    <a href="media/index.html">资产</a>
  </div>
  <div class="nav-right">
    <div class="nav-key-indicator" id="navKeyDot"></div>
  </div>
</nav>

<!-- Hero -->
<section class="hero">
  <div class="hero-brand">
    <div class="hero-brand-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
      </svg>
    </div>
  </div>
  <h1>所有模型服务</h1>
  <p class="hero-desc">为生物识别与科普场景提供多模态AI模型接口服务，为AI应用赋能</p>

  <!-- Search -->
  <div class="search-wrap">
    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
    </svg>
    <input class="search-bar" type="text" id="searchInput" placeholder="搜索模型接口...">
  </div>

  <!-- Category Tags -->
  <div class="category-bar" id="categoryBar">
    <div class="cat-tag active" data-cat="all">
      所有模型 <span class="cat-count" id="countAll"></span>
    </div>
    <div class="cat-tag" data-cat="text">
      文本模型 <span class="cat-count" id="countText"></span>
    </div>
    <div class="cat-tag" data-cat="image">
      图片模型 <span class="cat-count" id="countImage"></span>
    </div>
    <div class="cat-tag" data-cat="video">
      视频模型 <span class="cat-count" id="countVideo"></span>
    </div>
    <div class="cat-tag" data-cat="audio">
      音频模型 <span class="cat-count" id="countAudio"></span>
    </div>
  </div>
</section>

<!-- Main Content -->
<div class="main" id="models">
  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-num" id="statTotal">0</div>
      <div class="stat-label">全部模型</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statText">0</div>
      <div class="stat-label">文本模型</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statImage">0</div>
      <div class="stat-label">图片模型</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statVideo">0</div>
      <div class="stat-label">视频模型</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statAudio">0</div>
      <div class="stat-label">音频模型</div>
    </div>
  </div>

  <!-- Model Grid -->
  <div class="model-grid" id="modelGrid">
    <!-- Cards injected by JS -->
  </div>
</div>

<!-- Key Bar -->
<div class="key-bar">
  <div class="key-status" id="keyStatus"></div>
  <label>API 密钥</label>
  <input type="password" id="apiKeyInput" placeholder="输入密钥（保存后自动填充到所有模型页面）">
  <button class="key-save-btn" onclick="saveKey()">保存</button>
</div>

<script>
// ========== Model Data ==========
const MODELS = [
  {
    id: 'gpt_image2',
    name: 'GPT Image 2',
    category: 'image',
    icon: 'G2',
    desc: '文本描述生成高质量图像，支持 14 种比例、参考图输入、异步任务处理',
    price: '¥0.08 / 次',
    priceClass: '',
    info: 'POST /api/async/image_gpt',
    badge: 'paid',
    badgeText: '付费',
    tags: ['异步', '多比例', '参考图'],
    docUrl: 'models/image/gpt_image2.html',
    apiDocUrl: 'api_docs/image.html#gpt_image2'
  },
  {
    id: 'qwen_text',
    name: 'Qwen 长文本',
    category: 'text',
    icon: 'Qw',
    desc: '通义千问长文本理解与生成，支持超长上下文对话、文档摘要与内容创作',
    price: '免费',
    priceClass: 'free',
    info: 'POST /api/text/qwen',
    badge: 'free',
    badgeText: '免费',
    tags: ['长文本', '对话', '摘要'],
    docUrl: 'models/text/qwen.html',
    apiDocUrl: 'api_docs/text.html#qwen'
  },
  {
    id: 'step_video',
    name: 'Step Video',
    category: 'video',
    icon: 'SV',
    desc: '阶跃星辰文生视频模型，文本描述生成高质量短视频片段',
    price: '¥0.50 / 次',
    priceClass: '',
    info: 'POST /api/async/video_step',
    badge: 'paid',
    badgeText: '付费',
    tags: ['文生视频', '异步', '高清'],
    docUrl: 'models/video/step_video.html',
    apiDocUrl: 'api_docs/video.html#step_video'
  },
  {
    id: 'minimax_tts',
    name: 'MiniMax TTS',
    category: 'audio',
    icon: 'MM',
    desc: '高保真语音合成，支持多音色、多语速、情感控制的文本转语音服务',
    price: '¥0.02 / 百字',
    priceClass: '',
    info: 'POST /api/audio/tts',
    badge: 'paid',
    badgeText: '付费',
    tags: ['语音合成', '多音色', '情感'],
    docUrl: 'models/audio/minimax_tts.html',
    apiDocUrl: 'api_docs/audio.html#minimax_tts'
  }
];

// ========== Render ==========
const grid = document.getElementById('modelGrid');

function renderModels(filter = 'all', keyword = '') {
  const kw = keyword.trim().toLowerCase();
  const filtered = MODELS.filter(m => {
    const catMatch = filter === 'all' || m.category === filter;
    const kwMatch = !kw || m.name.toLowerCase().includes(kw) || m.desc.toLowerCase().includes(kw) || m.tags.some(t => t.includes(kw));
    return catMatch && kwMatch;
  });

  if (filtered.length === 0) {
    grid.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">&#128269;</div>
        <div>未找到匹配的模型接口</div>
      </div>`;
    return;
  }

  grid.innerHTML = filtered.map((m, i) => `
    <a class="model-card" href="${m.docUrl}" style="animation-delay:${i * .05}s">
      <div class="card-top">
        <div class="card-icon-wrap">
          <div class="card-icon ${m.category}">${m.icon}</div>
          <div>
            <div class="card-title">${m.name}</div>
            <div class="card-subtitle">${m.info}</div>
          </div>
        </div>
        <span class="card-badge ${m.badge}">${m.badgeText}</span>
      </div>
      <div class="card-desc">${m.desc}</div>
      <div class="card-bottom">
        <div class="card-meta">
          <span class="card-price ${m.priceClass}">${m.price}</span>
          <span class="card-info">${m.tags.join(' · ')}</span>
        </div>
        <span class="card-btn" onclick="event.preventDefault();event.stopPropagation();window.location='${m.apiDocUrl}'">
          查看文档
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/></svg>
        </span>
      </div>
    </a>
  `).join('');
}

// ========== Stats ==========
function updateStats() {
  const counts = { all: MODELS.length, text: 0, image: 0, video: 0, audio: 0 };
  MODELS.forEach(m => counts[m.category]++);
  document.getElementById('statTotal').textContent = counts.all;
  document.getElementById('statText').textContent = counts.text;
  document.getElementById('statImage').textContent = counts.image;
  document.getElementById('statVideo').textContent = counts.video;
  document.getElementById('statAudio').textContent = counts.audio;
  document.getElementById('countAll').textContent = counts.all;
  document.getElementById('countText').textContent = counts.text;
  document.getElementById('countImage').textContent = counts.image;
  document.getElementById('countVideo').textContent = counts.video;
  document.getElementById('countAudio').textContent = counts.audio;
}

// ========== Category Filter ==========
let currentCat = 'all';
const catBar = document.getElementById('categoryBar');
catBar.addEventListener('click', e => {
  const tag = e.target.closest('.cat-tag');
  if (!tag) return;
  catBar.querySelectorAll('.cat-tag').forEach(t => t.classList.remove('active'));
  tag.classList.add('active');
  currentCat = tag.dataset.cat;
  renderModels(currentCat, document.getElementById('searchInput').value);
});

// ========== Search ==========
const searchInput = document.getElementById('searchInput');
let searchTimer;
searchInput.addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    renderModels(currentCat, searchInput.value);
  }, 200);
});

// ========== API Key ==========
const keyInput = document.getElementById('apiKeyInput');
const keyStatus = document.getElementById('keyStatus');

function loadKey() {
  const k = localStorage.getItem('modelhub_api_key') || '';
  keyInput.value = k;
  keyStatus.classList.toggle('ok', !!k);
  document.getElementById('navKeyDot').classList.toggle('ok', !!k);
}

function saveKey() {
  const k = keyInput.value.trim();
  if (!k) {
    showToast('请输入密钥后再保存', 'error');
    return;
  }
  localStorage.setItem('modelhub_api_key', k);
  keyStatus.classList.add('ok');
  document.getElementById('navKeyDot').classList.add('ok');
  keyInput.type = 'password';
  showToast('密钥已保存到浏览器本地存储', 'success');
}

function showToast(msg, type) {
  let t = document.getElementById('toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'toast';
    t.className = 'toast';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.className = `toast ${type || ''} show`;
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 2000);
}

// ========== Smooth Scroll ==========
document.querySelectorAll('.nav-center a[href^="#"]').forEach(a => {
  a.addEventListener('click', e => {
    e.preventDefault();
    const target = document.querySelector(a.getAttribute('href'));
    if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
  });
});

// ========== Init ==========
updateStats();
renderModels();
loadKey();
keyInput.addEventListener('dblclick', () => { keyInput.type = keyInput.type === 'password' ? 'text' : 'password'; });
keyInput.addEventListener('keydown', e => { if (e.key === 'Enter') saveKey(); });
</script>
</body>
