@media(prefers-color-scheme:dark){:root{--bg:#0f0f14;--text:#e8e8ed;--text2:#a0a0b0;--text3:#666;--border:#2a2a35;--accent:#818cf8;--accent-light:rgba(99,102,241,.1);--accent-text:#a5b4fc;--bg2:#16161d;--purple:#a78bfa;--purple-light:rgba(167,139,250,.08)}}

.topnav-center a{color:var(--text2);text-decoration:none;font-size:13px;white-space:nowrap;transition:color .2s}
.topnav-center a:hover,.topnav-center a.active{color:var(--accent-text)}

h1{font-size:28px;font-weight:700;margin-bottom:8px}
p{color:var(--text2);font-size:14px;margin-bottom:24px}
a.btn{display:inline-block;padding:10px 24px;background:var(--accent);color:#fff;text-decoration:none;border-radius:8px;font-size:13px;font-weight:600}
