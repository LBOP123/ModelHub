<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>接口文档 - ModelHub</title>
<style>
:root{
  --bg:#ffffff;--bg2:#f8f9fb;--bg3:#f1f3f5;
  --text:#1a1a2e;--text2:#555;--text3:#888;
  --border:#e5e7eb;
  --accent:#6366f1;--accent-light:#eef2ff;--accent-text:#4f46e5;
  --card-bg:#fff;--card-hover:#fafbff;
  --green:#059669;--green-light:#ecfdf5;
  --amber:#d97706;--amber-light:#fffbeb;
  --blue:#2563eb;--blue-light:#eff6ff;
  --purple:#7c3aed;--purple-light:#f5f3ff;
  --shadow:0 1px 3px rgba(0,0,0,.06);
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#0f0f14;--bg2:#16161d;--bg3:#1e1e28;
    --text:#e8e8ed;--text2:#a0a0b0;--text3:#666;
    --border:#2a2a35;
    --accent:#818cf8;--accent-light:rgba(99,102,241,.1);--accent-text:#a5b4fc;
    --card-bg:#16161d;--card-hover:#1c1c26;
    --green:#34d399;--green-light:rgba(52,211,153,.08);
    --amber:#fbbf24;--amber-light:rgba(251,191,36,.08);
    --blue:#60a5fa;--blue-light:rgba(96,165,250,.08);
    --purple:#a78bfa;--purple-light:rgba(167,139,250,.08);
    --shadow:0 1px 3px rgba(0,0,0,.3);
  }
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

nav{position:fixed;top:0;left:0;right:0;z-index:100;backdrop-filter:blur(16px);background:rgba(255,255,255,.85);border-bottom:1px solid var(--border);padding:0 40px;height:60px;display:flex;align-items:center}
@media(prefers-color-scheme:dark){nav{background:rgba(15,15,20,.85)}}
.nav-brand{font-size:20px;font-weight:700;color:var(--accent);text-decoration:none;position:absolute;left:40px}
.nav-center{flex:1;display:flex;justify-content:center;gap:32px}
.nav-center a{color:var(--text2);text-decoration:none;font-size:14px;transition:color .2s;position:relative;padding:4px 0}
.nav-center a:hover{color:var(--text)}
.nav-center a.active{color:var(--accent-text);font-weight:600}
.nav-center a.active::after{content:'';position:absolute;bottom:-18px;left:0;right:0;height:2px;background:var(--accent);border-radius:1px}
.nav-right{position:absolute;right:40px}

.container{max-width:1000px;margin:0 auto;padding:90px 24px 60px}

.page-header{margin-bottom:40px}
.page-title{font-size:28px;font-weight:700;margin-bottom:8px}
.page-desc{font-size:14px;color:var(--text2)}

.doc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}

.doc-card{background:var(--card-bg);border:1px solid var(--border);border-radius:14px;padding:28px;transition:all .25s;text-decoration:none;color:inherit;display:block}
.doc-card:hover{border-color:var(--accent);box-shadow:var(--shadow);transform:translateY(-2px)}

.doc-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;margin-bottom:16px}
.doc-icon.image{background:var(--green-light);color:var(--green)}
.doc-icon.video{background:var(--amber-light);color:var(--amber)}
.doc-icon.audio{background:var(--purple-light);color:var(--purple)}
.doc-icon.text{background:var(--blue-light);color:var(--blue)}

.doc-name{font-size:17px;font-weight:600;margin-bottom:6px}
.doc-desc{font-size:13px;color:var(--text2);line-height:1.6}
.doc-count{display:inline-block;font-size:11px;padding:3px 10px;border-radius:99px;background:var(--bg3);color:var(--text3);margin-top:12px}
</style>
</head>
<body>

<nav>
  <a class="nav-brand" href="../index.html">ModelHub</a>
  <div class="nav-center">
    <a href="../index.html#models">模型</a>
    <a href="index.html" class="active">接口文档</a>
    <a href="../media/index.html">资产</a>
  </div>
  <div class="nav-right"></div>
</nav>

<div class="container">
  <div class="page-header">
    <h1 class="page-title">接口文档</h1>
    <p class="page-desc">查看所有模型的 API 接口文档，包含参数说明与调用示例</p>
  </div>

  <div class="doc-grid">
    <a class="doc-card" href="image.html">
      <div class="doc-icon image">I</div>
      <div class="doc-name">图像生成接口</div>
      <div class="doc-desc">GPT Image 2 等图像模型的完整 API 文档</div>
      <span class="doc-count">1 个接口</span>
    </a>
    <a class="doc-card" href="video.html">
      <div class="doc-icon video">V</div>
      <div class="doc-name">视频生成接口</div>
      <div class="doc-desc">视频生成模型的 API 文档（待接入）</div>
      <span class="doc-count">0 个接口</span>
    </a>
    <a class="doc-card" href="audio.html">
      <div class="doc-icon audio">A</div>
      <div class="doc-name">音频生成接口</div>
      <div class="doc-desc">音频生成模型的 API 文档（待接入）</div>
      <span class="doc-count">0 个接口</span>
    </a>
    <a class="doc-card" href="text.html">
      <div class="doc-icon text">T</div>
      <div class="doc-name">文本生成接口</div>
      <div class="doc-desc">文本生成模型的 API 文档（待接入）</div>
      <span class="doc-count">0 个接口</span>
    </a>
  </div>
</div>
</body>
</html>
