<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>模型管理 - ModelHub</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%234F6EF7'/><text x='50' y='68' font-size='52' font-weight='bold' text-anchor='middle' fill='white'>M</text></svg>">
<link rel="stylesheet" href="/css/common.css">
<style>
.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 84px 48px 80px;
}
.page-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 28px;
  animation: fadeUp .4s ease-out;
}
.page-header-left {
  display: flex;
  align-items: center;
  gap: 14px;
}
.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  color: var(--text-tertiary);
  text-decoration: none;
  margin-bottom: 8px;
  transition: var(--transition);
}
.back-btn:hover { color: var(--blue); }
.back-btn svg { width: 16px; height: 16px; }
.page-icon {
  width: 44px; height: 44px;
  border-radius: 12px;
  background: var(--green);
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 16px rgba(61,154,61,.25);
}
.page-icon svg { width: 22px; height: 22px; color: #fff; }
.page-title { font-size: 26px; font-weight: 800; margin-bottom: 2px; }
.page-desc { font-size: 13px; color: var(--text-tertiary); }

.btn-primary {
  padding: 10px 20px;
  border-radius: 10px;
  border: none;
  background: var(--blue);
  color: #fff;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
}
.btn-primary:hover { opacity: .85; }
.btn-sm { padding: 6px 14px; font-size: 12px; border-radius: 8px; }
.btn-green { background: var(--green); }
.btn-red { background: var(--red); }
.btn-ghost-sm {
  padding: 6px 14px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: transparent;
  font-size: 12px;
  cursor: pointer;
  transition: var(--transition);
  color: var(--text-secondary);
}
.btn-ghost-sm:hover { border-color: var(--blue); color: var(--blue); }

.filters {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
  flex-wrap: wrap;
  animation: fadeUp .4s ease-out .1s both;
}
.filter-select {
  padding: 8px 14px;
  border: 1px solid var(--border);
  border-radius: 10px;
  font-size: 13px;
  outline: none;
  background: var(--bg-white);
  cursor: pointer;
}
.search-input {
  padding: 8px 14px;
  border: 1px solid var(--border);
  border-radius: 10px;
  font-size: 13px;
  outline: none;
  transition: var(--transition);
  min-width: 200px;
}
.search-input:focus { border-color: var(--blue); }

.model-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 16px;
}
.model-card {
  background: var(--bg-white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  transition: var(--transition);
  animation: fadeUp .4s ease-out both;
}
.model-card:hover { border-color: var(--blue); box-shadow: var(--shadow); }
.model-card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.model-card-left {
  display: flex;
  align-items: center;
  gap: 10px;
}
.model-icon {
  width: 36px; height: 36px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 800;
  color: #fff;
}
.model-icon.image { background: #3d9a3d; }
.model-icon.video { background: #e89a3c; }
.model-icon.audio { background: var(--purple); }
.model-icon.text { background: var(--blue); }
.model-name { font-size: 15px; font-weight: 700; }
.model-id { font-size: 11px; color: var(--text-tertiary); }
.model-desc {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.6;
  margin-bottom: 12px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.model-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
.badge {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 999px;
  font-weight: 600;
}
.badge.free { background: var(--green-light); color: var(--green); }
.badge.paid { background: var(--orange-light); color: var(--orange); }
.badge.beta { background: var(--purple-light); color: var(--purple); }
.badge.cat {
  background: var(--bg);
  color: var(--text-tertiary);
}
.toggle-btn {
  padding: 4px 10px;
  border-radius: 999px;
  border: none;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
}
.toggle-btn.active { background: var(--green-light); color: var(--green); }
.toggle-btn.inactive { background: var(--red-light); color: var(--red); }
.model-actions {
  display: flex;
  gap: 8px;
  border-top: 1px solid #f5f5f5;
  padding-top: 12px;
}

/* Modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.4);
  backdrop-filter: blur(4px);
  z-index: 1000;
  display: none;
  align-items: center;
  justify-content: center;
}
.modal-overlay.active { display: flex; }
.modal {
  background: var(--bg-white);
  border-radius: var(--radius);
  padding: 32px;
  width: 90%;
  max-width: 640px;
  max-height: 85vh;
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,.15);
  animation: fadeUp .3s ease-out;
}
.modal-title {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 20px;
}
.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}
.form-group {
  margin-bottom: 14px;
}
.form-group label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 5px;
}
.form-group input,
.form-group select,
.form-group textarea {
  width: 100%;
  padding: 9px 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 13px;
  outline: none;
  transition: var(--transition);
  font-family: inherit;
  box-sizing: border-box;
}
.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus { border-color: var(--blue); }
.form-group textarea { min-height: 80px; resize: vertical; }
.form-group .checkbox-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 0;
}
.form-group input[type="checkbox"] { width: auto; }
.modal-actions {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
  margin-top: 20px;
}
.btn-cancel {
  padding: 10px 20px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-secondary);
  font-size: 14px;
  cursor: pointer;
}

.empty-state {
  text-align: center;
  padding: 60px;
  color: var(--text-tertiary);
  font-size: 14px;
}

@media (max-width: 768px) {
  .container { padding: 76px 16px 60px; }
  .page-title { font-size: 20px; }
  .page-header { flex-direction: column; align-items: flex-start; gap: 10px; }
  .model-grid { grid-template-columns: 1fr; }
  .form-row { grid-template-columns: 1fr; }
  .filters { flex-direction: column; }
  .search-input { min-width: auto; }
  .modal { padding: 20px; max-width: 95%; }
}
</style>
</head>
<body>

<nav class="navbar" id="navbar"></nav>

<div class="container">
  <a href="/pages/admin.html" class="back-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></svg>
    返回管理后台
  </a>

  <div class="page-header">
    <div class="page-header-left">
      <div class="page-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
      </div>
      <div>
        <h1 class="page-title">模型管理</h1>
        <p class="page-desc">管理平台所有模型配置</p>
      </div>
    </div>
    <button class="btn-primary" onclick="openCreate()">新建模型</button>
  </div>

  <div class="filters">
    <select class="filter-select" id="filterCat" onchange="loadModels()">
      <option value="">全部分类</option>
      <option value="image">图像</option>
      <option value="video">视频</option>
      <option value="audio">音频</option>
      <option value="text">文本</option>
    </select>
    <input type="text" class="search-input" id="searchInput" placeholder="搜索模型名称..." onkeydown="if(event.key==='Enter')loadModels()">
  </div>

  <div class="model-grid" id="modelGrid"></div>
</div>

<!-- Create/Edit Modal -->
<div class="modal-overlay" id="formModal">
  <div class="modal">
    <div class="modal-title" id="formTitle">新建模型</div>
    <input type="hidden" id="editId">
    <div class="form-row">
      <div class="form-group">
        <label>模型 ID *</label>
        <input type="text" id="fId" placeholder="如: gpt_image2">
      </div>
      <div class="form-group">
        <label>模型名称 *</label>
        <input type="text" id="fName" placeholder="如: GPT Image 2">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>分类 *</label>
        <select id="fCategory">
          <option value="image">图像</option>
          <option value="video">视频</option>
          <option value="audio">音频</option>
          <option value="text">文本</option>
        </select>
      </div>
      <div class="form-group">
        <label>图标文字</label>
        <input type="text" id="fIcon" placeholder="如: G2" maxlength="10">
      </div>
    </div>
    <div class="form-group">
      <label>描述 *</label>
      <textarea id="fDesc" placeholder="模型功能描述"></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>价格标签</label>
        <input type="text" id="fPriceLabel" placeholder="如: ¥0.08/次 或 免费">
      </div>
      <div class="form-group">
        <label>价格(分)</label>
        <input type="number" id="fPriceCents" value="0" min="0">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>徽章</label>
        <select id="fBadge">
          <option value="free">免费</option>
          <option value="paid">付费</option>
          <option value="beta">测试</option>
        </select>
      </div>
      <div class="form-group">
        <label>排序</label>
        <input type="number" id="fSort" value="0" min="0">
      </div>
    </div>
    <div class="form-group">
      <label>API 基础 URL</label>
      <input type="text" id="fBaseUrl" placeholder="https://api.wuyinkeji.com">
    </div>
    <div class="form-group">
      <label>API 端点</label>
      <input type="text" id="fEndpoint" placeholder="/api/async/image_gpt">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>请求方法</label>
        <select id="fMethod">
          <option value="POST">POST</option>
          <option value="GET">GET</option>
          <option value="PUT">PUT</option>
          <option value="DELETE">DELETE</option>
        </select>
      </div>
      <div class="form-group">
        <label>标签(逗号分隔)</label>
        <input type="text" id="fTags" placeholder="异步,多比例,参考图">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <div class="checkbox-wrap">
          <input type="checkbox" id="fAsync">
          <label for="fAsync" style="margin:0;cursor:pointer">异步模型</label>
        </div>
      </div>
      <div class="form-group">
        <div class="checkbox-wrap">
          <input type="checkbox" id="fActive" checked>
          <label for="fActive" style="margin:0;cursor:pointer">启用状态</label>
        </div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeForm()">取消</button>
      <button class="btn-primary" onclick="saveModel()">保存</button>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/common.js"></script>
<script>
renderNavbar('admin');
if (!checkAuth()) throw new Error('redirect');
if (!getAuthState().isAdmin) { window.location.href = '/'; throw new Error('redirect'); }

const CAT_NAMES = { image: '图像', video: '视频', audio: '音频', text: '文本' };

async function loadModels() {
  const grid = document.getElementById('modelGrid');
  const cat = document.getElementById('filterCat').value;
  const search = document.getElementById('searchInput').value.trim();

  try {
    const params = new URLSearchParams();
    if (cat) params.set('category', cat);
    if (search) params.set('search', search);
    const res = await api.get('/admin/models?' + params);
    const list = res.data || [];

    if (!list.length) {
      grid.innerHTML = '<div class="empty-state">暂无模型</div>';
      return;
    }

    grid.innerHTML = list.map((m, i) => `
      <div class="model-card" style="animation-delay:${i * .03}s">
        <div class="model-card-header">
          <div class="model-card-left">
            <div class="model-icon ${m.category}">${m.icon || m.category.charAt(0).toUpperCase()}</div>
            <div>
              <div class="model-name">${escHtml(m.name)}</div>
              <div class="model-id">${m.id}</div>
            </div>
          </div>
          <button class="toggle-btn ${m.is_active ? 'active' : 'inactive'}" onclick="toggleModel('${m.id}')">${m.is_active ? '已上架' : '已下架'}</button>
        </div>
        <div class="model-desc">${escHtml(m.description)}</div>
        <div class="model-meta">
          <span class="badge cat">${CAT_NAMES[m.category]}</span>
          <span class="badge ${m.badge}">${m.badge === 'free' ? '免费' : m.badge === 'paid' ? '付费' : '测试'}</span>
          <span style="font-size:12px;color:var(--text-tertiary)">${m.price_label || '免费'}</span>
        </div>
        <div class="model-actions">
          <button class="btn-ghost-sm" onclick="openEdit('${m.id}')">编辑</button>
          <button class="btn-ghost-sm" href="/pages/admin-docs.html?modelId=${m.id}" onclick="location.href='/pages/admin-docs.html?modelId=${m.id}'">文档</button>
          <button class="btn-ghost-sm" style="color:var(--red);border-color:var(--red-light)" onclick="deleteModel('${m.id}')">删除</button>
        </div>
      </div>
    `).join('');
  } catch (e) {
    grid.innerHTML = '<div class="empty-state">加载失败: ' + e.message + '</div>';
  }
}

function openCreate() {
  document.getElementById('formTitle').textContent = '新建模型';
  document.getElementById('editId').value = '';
  document.getElementById('fId').value = '';
  document.getElementById('fId').disabled = false;
  document.getElementById('fName').value = '';
  document.getElementById('fCategory').value = 'image';
  document.getElementById('fIcon').value = '';
  document.getElementById('fDesc').value = '';
  document.getElementById('fPriceLabel').value = '免费';
  document.getElementById('fPriceCents').value = '0';
  document.getElementById('fBadge').value = 'free';
  document.getElementById('fSort').value = '0';
  document.getElementById('fBaseUrl').value = 'https://api.wuyinkeji.com';
  document.getElementById('fEndpoint').value = '';
  document.getElementById('fMethod').value = 'POST';
  document.getElementById('fTags').value = '';
  document.getElementById('fAsync').checked = false;
  document.getElementById('fActive').checked = true;
  document.getElementById('formModal').classList.add('active');
}

async function openEdit(id) {
  try {
    const res = await api.get('/admin/models');
    const m = (res.data || []).find(x => x.id === id);
    if (!m) return showToast('模型不存在', 'error');

    document.getElementById('formTitle').textContent = '编辑模型';
    document.getElementById('editId').value = id;
    document.getElementById('fId').value = id;
    document.getElementById('fId').disabled = true;
    document.getElementById('fName').value = m.name || '';
    document.getElementById('fCategory').value = m.category || 'image';
    document.getElementById('fIcon').value = m.icon || '';
    document.getElementById('fDesc').value = m.description || '';
    document.getElementById('fPriceLabel').value = m.price_label || '';
    document.getElementById('fPriceCents').value = m.price_cents || 0;
    document.getElementById('fBadge').value = m.badge || 'free';
    document.getElementById('fSort').value = m.sort_order || 0;
    document.getElementById('fBaseUrl').value = m.api_base_url || '';
    document.getElementById('fEndpoint').value = m.api_endpoint || '';
    document.getElementById('fMethod').value = m.api_method || 'POST';
    document.getElementById('fTags').value = Array.isArray(m.tags) ? m.tags.join(',') : '';
    document.getElementById('fAsync').checked = !!m.is_async;
    document.getElementById('fActive').checked = !!m.is_active;
    document.getElementById('formModal').classList.add('active');
  } catch (e) {
    showToast('加载失败: ' + e.message, 'error');
  }
}

function closeForm() {
  document.getElementById('formModal').classList.remove('active');
}

async function saveModel() {
  const editId = document.getElementById('editId').value;
  const data = {
    name: document.getElementById('fName').value.trim(),
    category: document.getElementById('fCategory').value,
    icon: document.getElementById('fIcon').value.trim(),
    description: document.getElementById('fDesc').value.trim(),
    price_label: document.getElementById('fPriceLabel').value.trim(),
    price_cents: parseInt(document.getElementById('fPriceCents').value) || 0,
    badge: document.getElementById('fBadge').value,
    sort_order: parseInt(document.getElementById('fSort').value) || 0,
    api_base_url: document.getElementById('fBaseUrl').value.trim(),
    api_endpoint: document.getElementById('fEndpoint').value.trim(),
    api_method: document.getElementById('fMethod').value,
    tags: document.getElementById('fTags').value.split(',').map(s => s.trim()).filter(Boolean),
    is_async: document.getElementById('fAsync').checked ? 1 : 0,
    is_active: document.getElementById('fActive').checked ? 1 : 0
  };

  if (!data.name) return showToast('请输入模型名称', 'error');
  if (!data.description) return showToast('请输入描述', 'error');

  try {
    if (editId) {
      await api.put('/admin/models/' + editId, data);
      showToast('模型更新成功', 'success');
    } else {
      data.id = document.getElementById('fId').value.trim();
      if (!data.id) return showToast('请输入模型 ID', 'error');
      await api.post('/admin/models', data);
      showToast('模型创建成功', 'success');
    }
    closeForm();
    loadModels();
  } catch (e) {
    showToast(e.message, 'error');
  }
}

async function toggleModel(id) {
  try {
    await api.patch('/admin/models/' + id + '/toggle');
    loadModels();
  } catch (e) {
    showToast(e.message, 'error');
  }
}

async function deleteModel(id) {
  if (!confirm('确定要删除模型 ' + id + ' 吗？关联的 API 文档也会被删除。')) return;
  try {
    await api.delete('/admin/models/' + id);
    showToast('删除成功', 'success');
    loadModels();
  } catch (e) {
    showToast(e.message, 'error');
  }
}

document.getElementById('formModal').addEventListener('click', function(e) {
  if (e.target === this) closeForm();
});

loadModels();
</script>
</body>
</html>
