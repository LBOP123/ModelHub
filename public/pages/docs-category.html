<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>接口文档 - ModelHub</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%234F6EF7'/><text x='50' y='68' font-size='52' font-weight='bold' text-anchor='middle' fill='white'>M</text></svg>">
<link rel="stylesheet" href="/css/common.css">
<style>
.layout {
  display: flex;
  gap: 0;
  min-height: 100vh;
  padding-top: 60px;
}

/* Sidebar */
.sidebar {
  width: 240px;
  background: var(--bg-white);
  border-right: 1px solid var(--border);
  padding: 24px 0;
  position: fixed;
  top: 60px;
  bottom: 0;
  overflow-y: auto;
}
.sidebar-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-tertiary);
  padding: 0 20px;
  margin-bottom: 12px;
  text-transform: uppercase;
  letter-spacing: .5px;
}
.sidebar-link {
  display: block;
  padding: 10px 20px;
  font-size: 14px;
  color: var(--text-secondary);
  text-decoration: none;
  transition: var(--transition);
  border-left: 3px solid transparent;
}
.sidebar-link:hover {
  background: var(--bg);
  color: var(--text-primary);
}
.sidebar-link.active {
  color: var(--blue);
  font-weight: 600;
  background: var(--blue-light);
  border-left-color: var(--blue);
}
.sidebar-divider {
  height: 1px;
  background: var(--border);
  margin: 16px 20px;
}

/* Main content */
.content {
  flex: 1;
  margin-left: 240px;
  padding: 32px 48px 80px;
  max-width: 900px;
}
.breadcrumb {
  font-size: 13px;
  color: var(--text-tertiary);
  margin-bottom: 24px;
}
.breadcrumb a { color: var(--blue); text-decoration: none; }
.breadcrumb a:hover { text-decoration: underline; }

.doc-title {
  font-size: 24px;
  font-weight: 800;
  margin-bottom: 8px;
}
.doc-desc {
  font-size: 14px;
  color: var(--text-tertiary);
  margin-bottom: 32px;
}

/* Doc sections */
.doc-section {
  margin-bottom: 40px;
  background: var(--bg-white);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 28px;
  animation: fadeUp .4s ease-out both;
}
.section-title {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 6px;
}
.section-endpoint {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: 'SF Mono', Monaco, Consolas, monospace;
  font-size: 13px;
  background: var(--bg);
  padding: 6px 12px;
  border-radius: var(--radius-sm);
  margin-bottom: 20px;
  color: var(--text-secondary);
}
.method-badge {
  font-size: 11px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 4px;
  color: #fff;
}
.method-badge.POST { background: #49cc90; }
.method-badge.GET { background: #61affe; }
.method-badge.PUT { background: #fca130; }
.method-badge.DELETE { background: #f93e3e; }

/* Tables */
.param-table {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 20px;
  font-size: 13px;
}
.param-table th {
  text-align: left;
  padding: 10px 12px;
  background: var(--bg);
  color: var(--text-tertiary);
  font-weight: 600;
  font-size: 12px;
  border-bottom: 1px solid var(--border);
}
.param-table td {
  padding: 10px 12px;
  border-bottom: 1px solid #f5f5f5;
  color: var(--text-secondary);
  vertical-align: top;
}
.param-table tr:last-child td { border-bottom: none; }
.param-name {
  font-family: 'SF Mono', Monaco, Consolas, monospace;
  font-weight: 600;
  color: var(--text-primary);
}
.param-required {
  color: var(--red);
  font-size: 11px;
  margin-left: 4px;
}
.param-type {
  font-size: 11px;
  color: var(--text-tertiary);
  font-family: 'SF Mono', Monaco, Consolas, monospace;
}

/* Code blocks */
.code-block {
  position: relative;
  background: #1e1e2e;
  color: #cdd6f4;
  border-radius: var(--radius);
  padding: 16px;
  font-family: 'SF Mono', Monaco, Consolas, monospace;
  font-size: 13px;
  line-height: 1.6;
  overflow-x: auto;
  margin-bottom: 16px;
  white-space: pre-wrap;
  word-break: break-all;
}
.code-block .copy-btn {
  position: absolute;
  top: 8px;
  right: 8px;
  background: rgba(255,255,255,.1);
  color: #cdd6f4;
  border: none;
  border-radius: 6px;
  padding: 4px 10px;
  font-size: 11px;
  cursor: pointer;
  transition: var(--transition);
  font-family: inherit;
}
.code-block .copy-btn:hover { background: rgba(255,255,255,.2); }
.code-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-tertiary);
  margin-bottom: 8px;
}

/* Notes */
.notes {
  background: var(--blue-light);
  border: 1px solid var(--blue-bg);
  border-radius: var(--radius-sm);
  padding: 14px 18px;
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.7;
}

/* Empty */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-tertiary);
}

@media (max-width: 768px) {
  .sidebar { display: none; }
  .content { margin-left: 0; padding: 20px; }
}
</style>
</head>
<body>

<nav class="navbar" id="navbar"></nav>

<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="content" id="content"></main>
</div>

<script src="/js/api.js"></script>
<script src="/js/common.js"></script>
<script>
renderNavbar('docs');

const CAT_NAMES = { image: '图像生成', video: '视频生成', audio: '音频生成', text: '文本生成' };
const cat = new URLSearchParams(location.search).get('cat') || 'image';
const hashModel = location.hash.slice(1);

document.title = `${CAT_NAMES[cat] || cat} - 接口文档 - ModelHub`;

let currentModelId = null;

async function loadPage() {
  try {
    const modelsRes = await api.get(`/models?category=${cat}`);
    const models = modelsRes.data;

    // Sidebar
    const sidebar = document.getElementById('sidebar');
    sidebar.innerHTML = `
      <div class="sidebar-title">${CAT_NAMES[cat] || cat}</div>
      ${models.map(m => `
        <a class="sidebar-link" href="#${m.id}" data-model="${m.id}" onclick="loadDoc('${m.id}');return false">${m.name}</a>
      `).join('')}
      <div class="sidebar-divider"></div>
      <a class="sidebar-link" href="/pages/docs-index.html">&#8592; 返回文档首页</a>
    `;

    // Load first model or hash model
    const target = hashModel && models.find(m => m.id === hashModel) ? hashModel : (models[0] ? models[0].id : null);
    if (target) loadDoc(target);
    else document.getElementById('content').innerHTML = '<div class="empty-state">该分类暂无模型</div>';

  } catch (err) {
    document.getElementById('content').innerHTML = `<div class="empty-state">加载失败: ${err.message}</div>`;
  }
}

async function loadDoc(modelId) {
  currentModelId = modelId;
  history.replaceState(null, '', `?cat=${cat}#${modelId}`);

  // Update sidebar active
  document.querySelectorAll('.sidebar-link').forEach(l => {
    l.classList.toggle('active', l.dataset.model === modelId);
  });

  const content = document.getElementById('content');

  try {
    const res = await api.get(`/docs/${modelId}`);
    const { model, docs } = res.data;

    if (!docs.length) {
      content.innerHTML = `
        <div class="breadcrumb"><a href="/pages/docs-index.html">文档</a> / ${CAT_NAMES[cat]}</div>
        <h1 class="doc-title">${model.name}</h1>
        <div class="empty-state">暂无接口文档</div>
      `;
      return;
    }

    content.innerHTML = `
      <div class="breadcrumb"><a href="/pages/docs-index.html">文档</a> / <a href="?cat=${cat}">${CAT_NAMES[cat]}</a> / ${model.name}</div>
      <h1 class="doc-title">${model.name}</h1>
      <p class="doc-desc">${model.description}</p>
      ${docs.map((doc, i) => renderDocSection(doc, i)).join('')}
    `;
  } catch (err) {
    content.innerHTML = `<div class="empty-state">加载失败: ${err.message}</div>`;
  }
}

function renderDocSection(doc, i) {
  const headers = doc.headers_json || [];
  const params = doc.params_json || [];

  return `
    <div class="doc-section" style="animation-delay:${i * .08}s">
      <div class="section-title">${doc.title}</div>
      <div class="section-endpoint">
        <span class="method-badge ${doc.http_method}">${doc.http_method}</span>
        ${doc.endpoint_url}
      </div>

      ${headers.length ? `
        <div class="code-label">请求头</div>
        <table class="param-table">
          <tr><th>名称</th><th>值</th></tr>
          ${headers.map(h => `<tr><td class="param-name">${h.name}</td><td>${h.value}</td></tr>`).join('')}
        </table>
      ` : ''}

      ${params.length ? `
        <div class="code-label">请求参数</div>
        <table class="param-table">
          <tr><th>参数</th><th>类型</th><th>说明</th></tr>
          ${params.map(p => `
            <tr>
              <td><span class="param-name">${p.name}</span>${p.required ? '<span class="param-required">*</span>' : ''}</td>
              <td><span class="param-type">${p.type || '-'}</span></td>
              <td>${p.desc || '-'}</td>
            </tr>
          `).join('')}
        </table>
      ` : ''}

      ${doc.request_example ? `
        <div class="code-label">请求示例</div>
        <div class="code-block">
          <button class="copy-btn" onclick="copyCode(this)">复制</button>${escapeHtml(doc.request_example)}
        </div>
      ` : ''}

      ${doc.response_example ? `
        <div class="code-label">响应示例</div>
        <div class="code-block">
          <button class="copy-btn" onclick="copyCode(this)">复制</button>${escapeHtml(doc.response_example)}
        </div>
      ` : ''}

      ${doc.notes_html ? `<div class="notes">${doc.notes_html}</div>` : ''}
    </div>
  `;
}

function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function copyCode(btn) {
  const text = btn.parentElement.textContent.replace('复制', '').trim();
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '已复制';
    setTimeout(() => btn.textContent = '复制', 1500);
  });
}

loadPage();
</script>
</body>
</html>
