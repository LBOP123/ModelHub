<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>仪表盘 - ModelHub</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%234F6EF7'/><text x='50' y='68' font-size='52' font-weight='bold' text-anchor='middle' fill='white'>M</text></svg>">
<link rel="stylesheet" href="/css/common.css">
<style>
.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 84px 48px 80px;
}
.page-header {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 32px;
  animation: fadeUp .4s ease-out;
}
.page-icon {
  width: 44px; height: 44px;
  border-radius: 12px;
  background: var(--blue);
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 16px rgba(79,110,247,.25);
}
.page-icon svg { width: 22px; height: 22px; color: #fff; }
.page-title { font-size: 26px; font-weight: 800; margin-bottom: 2px; }
.page-desc { font-size: 13px; color: var(--text-tertiary); }

/* Stats Cards */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 32px;
}
.stat-card {
  background: var(--bg-white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 22px;
  transition: var(--transition);
  animation: fadeUp .4s ease-out both;
}
.stat-card:hover { border-color: var(--blue); box-shadow: var(--shadow); }
.stat-card:nth-child(2) { animation-delay: .05s; }
.stat-card:nth-child(3) { animation-delay: .1s; }
.stat-card:nth-child(4) { animation-delay: .15s; }
.stat-icon {
  width: 40px; height: 40px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 14px;
}
.stat-icon svg { width: 20px; height: 20px; }
.stat-icon.blue { background: var(--blue-light); color: var(--blue); }
.stat-icon.green { background: var(--green-light); color: var(--green); }
.stat-icon.orange { background: var(--orange-light); color: var(--orange); }
.stat-icon.purple { background: var(--purple-light); color: var(--purple); }
.stat-value { font-size: 28px; font-weight: 800; color: var(--text-primary); letter-spacing: -1px; }
.stat-label { font-size: 13px; color: var(--text-tertiary); margin-top: 2px; }

/* Two column layout */
.columns {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-bottom: 32px;
}

/* Card */
.card {
  background: var(--bg-white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  animation: fadeUp .4s ease-out .2s both;
}
.card-title {
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 18px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.card-title-icon {
  width: 28px; height: 28px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.card-title-icon svg { width: 15px; height: 15px; }
.card-title-icon.blue { background: var(--blue-light); color: var(--blue); }
.card-title-icon.purple { background: var(--purple-light); color: var(--purple); }
.card-title-icon.orange { background: var(--orange-light); color: var(--orange); }

/* Model list */
.model-list-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid #f5f5f5;
}
.model-list-item:last-child { border-bottom: none; }
.model-list-left { display: flex; align-items: center; gap: 10px; }
.model-list-icon {
  width: 32px; height: 32px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.model-list-icon svg { width: 16px; height: 16px; }
.model-list-icon.image { background: #e8f4e8; color: #3d9a3d; }
.model-list-icon.video { background: #fef3e2; color: #e89a3c; }
.model-list-icon.audio { background: var(--purple-light); color: var(--purple); }
.model-list-icon.text  { background: var(--blue-light); color: var(--blue); }
.model-list-name { font-size: 14px; font-weight: 600; }
.model-list-cat { font-size: 11px; color: var(--text-tertiary); }
.model-list-badge {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 999px;
  font-weight: 500;
}
.model-list-badge.free { background: var(--green-light); color: var(--green); }
.model-list-badge.paid { background: var(--orange-light); color: var(--orange); }

/* Recent records */
.record-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid #f5f5f5;
}
.record-item:last-child { border-bottom: none; }
.record-thumb {
  width: 48px; height: 48px;
  border-radius: 8px;
  object-fit: cover;
  background: var(--bg);
  flex-shrink: 0;
}
.record-info { flex: 1; min-width: 0; }
.record-prompt {
  font-size: 13px;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.record-meta { font-size: 11px; color: var(--text-tertiary); margin-top: 2px; }
.record-status {
  font-size: 11px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 999px;
  flex-shrink: 0;
}
.record-status.success { background: var(--green-light); color: var(--green); }
.record-status.pending { background: var(--orange-light); color: var(--orange); }
.record-status.failed  { background: var(--red-light); color: var(--red); }

/* Top 5 ranking */
.rank-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid #f5f5f5;
}
.rank-item:last-child { border-bottom: none; }
.rank-num {
  width: 24px; height: 24px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  flex-shrink: 0;
  background: var(--bg);
  color: var(--text-tertiary);
}
.rank-num.top1 { background: #fff3e0; color: #e65100; }
.rank-num.top2 { background: #e3f2fd; color: #1565c0; }
.rank-num.top3 { background: #e8f5e9; color: #2e7d32; }
.rank-left { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
.rank-icon {
  width: 32px; height: 32px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.rank-icon svg { width: 16px; height: 16px; }
.rank-icon.image { background: #e8f4e8; color: #3d9a3d; }
.rank-icon.video { background: #fef3e2; color: #e89a3c; }
.rank-icon.audio { background: var(--purple-light); color: var(--purple); }
.rank-icon.text  { background: var(--blue-light); color: var(--blue); }
.rank-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.rank-bar-wrap {
  flex: 1;
  height: 6px;
  background: var(--bg);
  border-radius: 3px;
  overflow: hidden;
  min-width: 60px;
}
.rank-bar {
  height: 100%;
  border-radius: 3px;
  background: var(--blue);
  transition: width .8s ease-out;
}
.rank-count { font-size: 13px; font-weight: 700; color: var(--text-primary); min-width: 36px; text-align: right; }

/* Empty */
.empty-mini {
  text-align: center;
  padding: 30px;
  color: var(--text-tertiary);
  font-size: 13px;
}

/* Full width card */
.full-card {
  grid-column: 1 / -1;
  animation: fadeUp .4s ease-out .25s both;
}

@media (max-width: 768px) {
  .container { padding: 80px 20px 60px; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .columns { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<nav class="navbar" id="navbar"></nav>

<div class="container">
  <div class="page-header">
    <div class="page-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
    </div>
    <div>
      <h1 class="page-title">工作台</h1>
      <p class="page-desc">模型调用统计与数据分析</p>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-icon blue">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
      </div>
      <div class="stat-value" id="statModels">-</div>
      <div class="stat-label">可用模型</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon green">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
      </div>
      <div class="stat-value" id="statCalls">-</div>
      <div class="stat-label">总调用次数</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon orange">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      </div>
      <div class="stat-value" id="statSuccess">-</div>
      <div class="stat-label">成功次数</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon purple">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      </div>
      <div class="stat-value" id="statToday">-</div>
      <div class="stat-label">今日调用</div>
    </div>
  </div>

  <div class="columns">
    <!-- Model list -->
    <div class="card">
      <div class="card-title">
        <span class="card-title-icon blue">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
        </span>
        模型列表
      </div>
      <div id="modelList"></div>
    </div>

    <!-- Top 5 Models -->
    <div class="card">
      <div class="card-title">
        <span class="card-title-icon purple">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        </span>
        热门模型 Top 5
      </div>
      <div id="topModels"></div>
    </div>
  </div>

  <!-- Recent calls -->
  <div class="card full-card">
    <div class="card-title">
      <span class="card-title-icon orange">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      </span>
      最近调用
    </div>
    <div id="recentCalls"></div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/common.js"></script>
<script>
renderNavbar('dashboard');
if (!checkAuth()) throw new Error('redirect');

const isAdmin = getAuthState().isAdmin;
if (isAdmin) {
  document.querySelector('.page-title').textContent = '管理员工作台';
  document.querySelector('.page-desc').textContent = '全站模型调用统计与数据分析';
}

const CAT_NAMES = { image: '图像', video: '视频', audio: '音频', text: '文本' };
const CAT_ICONS = {
  image: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>`,
  video: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>`,
  audio: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>`,
  text: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>`
};

async function loadDashboard() {
  const { isLoggedIn } = getAuthState();

  // Load models (always)
  let models = [];
  try {
    const res = await api.get('/models');
    models = res.data;
  } catch {}

  document.getElementById('statModels').textContent = models.length;

  // Model list
  const modelListEl = document.getElementById('modelList');
  if (models.length) {
    modelListEl.innerHTML = models.map(m => `
      <div class="model-list-item">
        <div class="model-list-left">
          <div class="model-list-icon ${m.category}">${CAT_ICONS[m.category] || ''}</div>
          <div>
            <div class="model-list-name">${m.name}</div>
            <div class="model-list-cat">${CAT_NAMES[m.category] || m.category}</div>
          </div>
        </div>
        <span class="model-list-badge ${m.badge}">${m.badge === 'free' ? '免费' : '付费'}</span>
      </div>
    `).join('');
  } else {
    modelListEl.innerHTML = '<div class="empty-mini">暂无模型</div>';
  }

  // Top 5 Models
  const topEl = document.getElementById('topModels');
  if (isLoggedIn) {
    try {
      const topRes = await api.get('/assets/top-models');
      const topModels = topRes.data || [];
      if (topModels.length) {
        const maxCount = topModels[0].call_count;
        topEl.innerHTML = topModels.map((m, i) => `
          <div class="rank-item">
            <span class="rank-num ${i === 0 ? 'top1' : i === 1 ? 'top2' : i === 2 ? 'top3' : ''}">${i + 1}</span>
            <div class="rank-left">
              <div class="rank-icon ${m.category}">${CAT_ICONS[m.category] || ''}</div>
              <span class="rank-name">${m.name}</span>
            </div>
            <div class="rank-bar-wrap">
              <div class="rank-bar" style="width:${m.call_count / maxCount * 100}%"></div>
            </div>
            <span class="rank-count">${m.call_count}</span>
          </div>
        `).join('');
      } else {
        topEl.innerHTML = '<div class="empty-mini">暂无调用数据</div>';
      }
    } catch {
      topEl.innerHTML = '<div class="empty-mini">加载失败</div>';
    }
  } else {
    topEl.innerHTML = '<div class="empty-mini"><a href="/login.html" style="color:var(--blue)">登录</a> 后可查看排名</div>';
  }

  // User stats (if logged in)
  const recentEl = document.getElementById('recentCalls');
  if (isLoggedIn) {
    try {
      const statsRes = await api.get('/assets/stats?include_deleted=1');
      const s = statsRes.data;
      document.getElementById('statCalls').textContent = s.total;
      document.getElementById('statSuccess').textContent = '-';

      const recRes = await api.get('/assets?limit=6&include_deleted=1');
      const records = recRes.data.list || [];

      // Count today
      const today = new Date().toISOString().slice(0, 10);
      const todayCount = records.filter(r => r.created_at && r.created_at.slice(0, 10) === today).length;
      document.getElementById('statToday').textContent = todayCount;

      // Get success count
      try {
        const allRes = await api.get('/assets?limit=100&include_deleted=1');
        const all = allRes.data.list || [];
        document.getElementById('statSuccess').textContent = all.filter(r => r.status === 'success').length;
      } catch {}

      if (records.length) {
        recentEl.innerHTML = records.map(r => `
          <div class="record-item">
            ${r.response_url ? `<img class="record-thumb" src="${r.response_url}" onerror="this.style.display='none'">` : `<div class="record-thumb"></div>`}
            <div class="record-info">
              <div class="record-prompt">${r.request_params?.prompt || JSON.stringify(r.request_params || {})}</div>
              <div class="record-meta">${isAdmin && r.username ? r.username + ' · ' : ''}${r.model_name} · ${formatTime(r.created_at)}</div>
            </div>
            <span class="record-status ${r.status}">${r.status === 'success' ? '成功' : r.status === 'pending' ? '进行中' : '失败'}</span>
          </div>
        `).join('');
      } else {
        recentEl.innerHTML = '<div class="empty-mini">暂无调用记录</div>';
      }
    } catch {
      document.getElementById('statCalls').textContent = '0';
      document.getElementById('statSuccess').textContent = '0';
      document.getElementById('statToday').textContent = '0';
      recentEl.innerHTML = '<div class="empty-mini">暂无调用记录</div>';
    }
  } else {
    document.getElementById('statCalls').textContent = '-';
    document.getElementById('statSuccess').textContent = '-';
    document.getElementById('statToday').textContent = '-';
    recentEl.innerHTML = '<div class="empty-mini"><a href="/login.html" style="color:var(--blue)">登录</a> 后可查看调用统计</div>';
  }
}

loadDashboard();
</script>
</body>
</html>
