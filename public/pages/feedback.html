<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的反馈 - ModelHub</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%234F6EF7'/><text x='50' y='68' font-size='52' font-weight='bold' text-anchor='middle' fill='white'>M</text></svg>">
<link rel="stylesheet" href="/css/common.css">
<style>
.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 84px 48px 80px;
}
.page-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
  animation: fadeUp .4s ease-out;
}
.page-header-left {
  display: flex;
  align-items: center;
  gap: 14px;
}
.page-icon {
  width: 40px; height: 40px;
  border-radius: 10px;
  background: var(--blue);
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 16px rgba(79,110,247,.25);
}
.page-icon svg { width: 20px; height: 20px; color: #fff; }
.page-title { font-size: 22px; font-weight: 800; }

.btn-primary {
  padding: 8px 18px;
  border-radius: 10px;
  border: none;
  background: var(--blue);
  color: #fff;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
}
.btn-primary:hover { opacity: .85; }

/* Modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.4);
  backdrop-filter: blur(4px);
  z-index: 1000;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 16px;
}
.modal-overlay.active { display: flex; }
.modal {
  background: var(--bg-white);
  border-radius: var(--radius);
  padding: 24px;
  width: 100%;
  max-width: 520px;
  box-shadow: 0 20px 60px rgba(0,0,0,.15);
  animation: fadeUp .3s ease-out;
}
.modal-title {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 16px;
}
.form-group {
  margin-bottom: 12px;
}
.form-group label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 4px;
}
.form-group input,
.form-group textarea {
  width: 100%;
  padding: 9px 12px;
  border: 1px solid var(--border);
  border-radius: 10px;
  font-size: 14px;
  outline: none;
  transition: var(--transition);
  font-family: inherit;
  box-sizing: border-box;
}
.form-group input:focus,
.form-group textarea:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(79,110,247,.1); }
.form-group textarea { min-height: 100px; resize: vertical; }
.modal-actions {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
  margin-top: 16px;
}
.btn-ghost {
  padding: 8px 18px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-secondary);
  font-size: 13px;
  cursor: pointer;
  transition: var(--transition);
}

/* Feedback list - compact */
.feedback-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.feedback-card {
  background: var(--bg-white);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 16px;
  transition: var(--transition);
  cursor: pointer;
  animation: fadeUp .3s ease-out both;
}
.feedback-card:hover { border-color: var(--blue); }
.feedback-row {
  display: flex;
  align-items: center;
  gap: 10px;
}
.feedback-title {
  font-size: 14px;
  font-weight: 600;
  flex: 1;
  min-width: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.feedback-status {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 999px;
  font-weight: 600;
  flex-shrink: 0;
}
.feedback-status.pending { background: var(--orange-light); color: var(--orange); }
.feedback-status.accepted { background: var(--green-light); color: var(--green); }
.feedback-status.rejected { background: var(--red-light); color: var(--red); }
.feedback-status.replied { background: var(--blue-light); color: var(--blue); }
.feedback-time {
  font-size: 11px;
  color: var(--text-tertiary);
  flex-shrink: 0;
}
.feedback-detail {
  display: none;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid #f0f0f0;
}
.feedback-card.expanded .feedback-detail { display: block; }
.feedback-content {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.7;
  white-space: pre-wrap;
  margin-bottom: 8px;
}
.feedback-reply {
  padding: 10px 12px;
  background: var(--blue-light);
  border-radius: 8px;
  border-left: 3px solid var(--blue);
}
.feedback-reply-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--blue);
  margin-bottom: 4px;
}
.feedback-reply-text {
  font-size: 13px;
  color: var(--text-primary);
  line-height: 1.6;
  white-space: pre-wrap;
}
.feedback-reply-time {
  font-size: 11px;
  color: var(--text-tertiary);
  margin-top: 4px;
}

.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-tertiary);
  font-size: 13px;
}

@media (max-width: 768px) {
  .container { padding: 76px 16px 60px; }
  .page-header { flex-direction: column; align-items: flex-start; gap: 10px; }
  .page-title { font-size: 20px; }
  .feedback-title { font-size: 13px; }
}
</style>
</head>
<body>

<nav class="navbar" id="navbar"></nav>

<div class="container">
  <div class="page-header">
    <div class="page-header-left">
      <div class="page-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </div>
      <h1 class="page-title">我的反馈</h1>
    </div>
    <button class="btn-primary" onclick="openModal()">+ 提交反馈</button>
  </div>

  <div class="feedback-list" id="feedbackList"></div>
</div>

<!-- Submit Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title">提交反馈</div>
    <div class="form-group">
      <label>标题</label>
      <input type="text" id="fbTitle" placeholder="简要描述你的建议或问题" maxlength="200">
    </div>
    <div class="form-group">
      <label>详细内容</label>
      <textarea id="fbContent" placeholder="请详细描述你的意见、建议或遇到的问题..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal()">取消</button>
      <button class="btn-primary" onclick="submitFeedback()">提交</button>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/common.js"></script>
<script>
renderNavbar('feedback');
if (!checkAuth()) throw new Error('redirect');

const STATUS_TEXT = { pending: '待处理', accepted: '已接受', rejected: '已拒绝', replied: '已回复' };

function openModal() {
  document.getElementById('modal').classList.add('active');
  document.getElementById('fbTitle').focus();
}

function closeModal() {
  document.getElementById('modal').classList.remove('active');
  document.getElementById('fbTitle').value = '';
  document.getElementById('fbContent').value = '';
}

async function submitFeedback() {
  const title = document.getElementById('fbTitle').value.trim();
  const content = document.getElementById('fbContent').value.trim();
  if (!title) return showToast('请输入标题', 'error');
  if (!content) return showToast('请输入内容', 'error');

  try {
    await api.post('/feedbacks', { title, content });
    showToast('反馈提交成功', 'success');
    closeModal();
    loadFeedbacks();
  } catch (e) {
    showToast(e.message, 'error');
  }
}

async function loadFeedbacks() {
  const el = document.getElementById('feedbackList');
  try {
    const res = await api.get('/feedbacks');
    const list = res.data?.list || [];
    if (!list.length) {
      el.innerHTML = `
        <div class="empty-state">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          <p>暂无反馈，点击上方按钮提交你的建议</p>
        </div>`;
      return;
    }

    el.innerHTML = list.map((fb, i) => `
      <div class="feedback-card" style="animation-delay:${i * .03}s" onclick="this.classList.toggle('expanded')">
        <div class="feedback-row">
          <span class="feedback-title">${escHtml(fb.title)}</span>
          <span class="feedback-status ${fb.status}">${STATUS_TEXT[fb.status] || fb.status}</span>
          <span class="feedback-time">${formatTime(fb.created_at)}</span>
        </div>
        <div class="feedback-detail">
          <div class="feedback-content">${escHtml(fb.content)}</div>
          ${fb.admin_reply ? `
            <div class="feedback-reply">
              <div class="feedback-reply-label">管理员回复</div>
              <div class="feedback-reply-text">${escHtml(fb.admin_reply)}</div>
              ${fb.replied_at ? `<div class="feedback-reply-time">${formatTime(fb.replied_at)}</div>` : ''}
            </div>
          ` : ''}
        </div>
      </div>
    `).join('');
  } catch (e) {
    el.innerHTML = '<div class="empty-state"><p>加载失败: ' + e.message + '</p></div>';
  }
}

loadFeedbacks();
</script>
</body>
</html>
