<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ModelHub - 模型广场</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%234F6EF7'/><text x='50' y='68' font-size='52' font-weight='bold' text-anchor='middle' fill='white'>M</text></svg>">
<link rel="stylesheet" href="/css/common.css">
<style>
.page-header {
  max-width: 1200px;
  margin: 0 auto;
  padding: 84px 48px 0;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  animation: fadeUp .4s ease-out;
}
.page-header-icon {
  width: 48px; height: 48px;
  border-radius: 14px;
  background: var(--blue);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 4px 16px rgba(79,110,247,.25);
}
.page-header-icon svg { width: 24px; height: 24px; color: #fff; }
.page-title { font-size: 24px; font-weight: 800; letter-spacing: -.3px; }
.page-desc { font-size: 13px; color: var(--text-tertiary); margin-top: 2px; }

.toolbar {
  max-width: 1200px;
  margin: 0 auto;
  padding: 20px 48px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}
.search-wrap {
  flex: 1;
  min-width: 220px;
  max-width: 360px;
  position: relative;
}
.search-bar {
  width: 100%;
  height: 38px;
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 0 16px 0 38px;
  font-size: 13px;
  color: var(--text-primary);
  background: var(--bg-white);
  outline: none;
  transition: var(--transition);
  font-family: inherit;
}
.search-bar::placeholder { color: var(--text-placeholder); }
.search-bar:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(79,110,247,.1); }
.search-icon {
  position: absolute;
  left: 13px;
  top: 50%; transform: translateY(-50%);
  width: 15px; height: 15px;
  color: var(--text-placeholder);
  pointer-events: none;
}
.category-bar { display: flex; gap: 8px; flex-wrap: wrap; }
.cat-tag {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  height: 32px;
  padding: 0 14px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--bg-white);
  color: var(--text-secondary);
  transition: var(--transition);
  user-select: none;
}
.cat-tag:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-light); }
.cat-tag.active { background: var(--blue); color: #fff; border-color: var(--blue); }
.cat-count { font-size: 11px; opacity: .7; }

.main { max-width: 1200px; margin: 0 auto; padding: 0 48px 100px; }
.model-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
  gap: 16px;
}
.model-card {
  background: var(--bg-white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  cursor: pointer;
  transition: var(--transition);
  text-decoration: none;
  color: inherit;
  display: flex;
  flex-direction: column;
  animation: fadeUp .35s ease-out both;
}
.model-card:hover { border-color: transparent; box-shadow: var(--shadow-hover); transform: translateY(-2px); }
.card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; }
.card-icon-wrap { display: flex; align-items: center; gap: 10px; }
.card-icon {
  width: 38px; height: 38px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.card-icon svg { width: 20px; height: 20px; }
.card-icon.image { background: #e8f4e8; color: #3d9a3d; }
.card-icon.video { background: #fef3e2; color: #e89a3c; }
.card-icon.audio { background: var(--purple-light); color: var(--purple); }
.card-icon.text  { background: var(--blue-light); color: var(--blue); }
.card-title { font-size: 15px; font-weight: 700; line-height: 1.3; }
.card-subtitle { font-size: 11px; color: var(--text-tertiary); margin-top: 2px; font-family: 'SF Mono', Monaco, Consolas, monospace; }
.card-badge { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 999px; flex-shrink: 0; }
.card-badge.free { background: var(--green-light); color: var(--green); }
.card-badge.paid { background: var(--orange-light); color: var(--orange); }
.card-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 14px; flex: 1; }
.card-bottom { display: flex; align-items: center; justify-content: space-between; padding-top: 14px; border-top: 1px solid #f2f3f5; }
.card-meta { display: flex; flex-direction: column; gap: 2px; }
.card-price { font-size: 13px; font-weight: 700; }
.card-price.free { color: var(--green); }
.card-info { font-size: 11px; color: var(--text-tertiary); }
.card-btn {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  height: 30px;
  padding: 0 14px;
  border-radius: 999px;
  background: var(--blue);
  color: #fff;
  font-size: 12px;
  font-weight: 500;
  border: none;
  cursor: pointer;
  transition: var(--transition);
  font-family: inherit;
}
.card-btn:hover { background: var(--blue-hover); }
.card-btn svg { width: 13px; height: 13px; }
.empty-state { text-align: center; padding: 60px 20px; color: var(--text-tertiary); font-size: 14px; grid-column: 1 / -1; }

.key-bar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  height: 50px;
  background: rgba(255,255,255,.92);
  backdrop-filter: blur(20px) saturate(180%);
  border-top: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 48px; gap: 12px;
}
.key-bar label { font-size: 13px; color: var(--text-secondary); white-space: nowrap; font-weight: 500; }
.key-input-wrap {
  position: relative; flex: 1; max-width: 340px;
}
.key-input-wrap input {
  width: 100%; height: 32px;
  background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 0 32px 0 12px; color: var(--text-primary); font-size: 13px;
  font-family: 'SF Mono', Monaco, Consolas, monospace; outline: none; transition: var(--transition);
}
.key-input-wrap input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(79,110,247,.1); }
.key-toggle {
  position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
  width: 22px; height: 22px; display: flex; align-items: center; justify-content: center;
  background: none; border: none; color: var(--text-tertiary); cursor: pointer; padding: 0;
}
.key-toggle:hover { color: var(--text-primary); }
.key-toggle svg { width: 14px; height: 14px; }
.key-status { width: 8px; height: 8px; border-radius: 50%; background: #c9cdd4; flex-shrink: 0; transition: background .3s; }
.key-status.ok { background: var(--green); }
.key-save-btn {
  height: 32px; padding: 0 16px; background: var(--blue); color: #fff;
  border: none; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500;
  cursor: pointer; transition: var(--transition); font-family: inherit;
}
.key-save-btn:hover { background: var(--blue-hover); }
body { padding-bottom: 50px; }

@media (max-width: 768px) {
  .page-header { padding: 80px 20px 0; }
  .toolbar { padding: 16px 20px 20px; flex-direction: column; align-items: stretch; }
  .search-wrap { max-width: 100%; }
  .main { padding: 0 20px 80px; }
  .model-grid { grid-template-columns: 1fr; }
  .key-bar { padding: 0 20px; }
}
</style>
</head>
<body>

<nav class="navbar" id="navbar"></nav>

<div class="page-header">
  <div class="page-header-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
  </div>
  <div class="page-header-text">
    <h1 class="page-title">模型广场</h1>
    <p class="page-desc">多模态AI模型接口服务，为AI应用赋能</p>
  </div>
</div>

<div class="toolbar">
  <div class="search-wrap">
    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    <input class="search-bar" type="text" id="searchInput" placeholder="搜索模型接口...">
  </div>
  <div class="category-bar" id="categoryBar">
    <div class="cat-tag active" data-cat="all">所有模型 <span class="cat-count" id="countAll"></span></div>
    <div class="cat-tag" data-cat="text">文本 <span class="cat-count" id="countText"></span></div>
    <div class="cat-tag" data-cat="image">图片 <span class="cat-count" id="countImage"></span></div>
    <div class="cat-tag" data-cat="video">视频 <span class="cat-count" id="countVideo"></span></div>
    <div class="cat-tag" data-cat="audio">音频 <span class="cat-count" id="countAudio"></span></div>
  </div>
</div>

<div class="main">
  <div class="model-grid" id="modelGrid"></div>
</div>

<div class="key-bar">
  <div class="key-status" id="keyStatus"></div>
  <label>API 密钥</label>
  <div class="key-input-wrap">
    <input type="password" id="apiKeyInput" placeholder="输入密钥（保存后自动填充到模型页面）">
    <button class="key-toggle" type="button" onclick="toggleKeyVisibility()">
      <svg id="eyeOff" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
      <svg id="eyeOn" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
    </button>
  </div>
  <button class="key-save-btn" onclick="saveKey()">保存</button>
</div>

<script src="/js/api.js"></script>
<script src="/js/common.js"></script>
<script>
renderNavbar('home');
if (!checkAuth()) throw new Error('redirect');

const CAT_ICONS = {
  image: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>`,
  video: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>`,
  audio: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>`,
  text: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>`
};

let allModels = [];
let currentCat = 'all';

async function loadModels() {
  try {
    const res = await api.get('/models');
    allModels = res.data;
    updateCounts();
    renderModels();
  } catch (err) {
    document.getElementById('modelGrid').innerHTML = `<div class="empty-state">加载失败: ${err.message}</div>`;
  }
}

function updateCounts() {
  const c = { all: allModels.length, text: 0, image: 0, video: 0, audio: 0 };
  allModels.forEach(m => { if (c[m.category] !== undefined) c[m.category]++; });
  document.getElementById('countAll').textContent = c.all;
  document.getElementById('countText').textContent = c.text;
  document.getElementById('countImage').textContent = c.image;
  document.getElementById('countVideo').textContent = c.video;
  document.getElementById('countAudio').textContent = c.audio;
}

function renderModels() {
  const kw = document.getElementById('searchInput').value.trim().toLowerCase();
  const filtered = allModels.filter(m => {
    const catMatch = currentCat === 'all' || m.category === currentCat;
    const kwMatch = !kw || m.name.toLowerCase().includes(kw) || m.description.toLowerCase().includes(kw) || (m.tags && m.tags.some(t => t.includes(kw)));
    return catMatch && kwMatch;
  });

  const grid = document.getElementById('modelGrid');
  if (!filtered.length) {
    grid.innerHTML = `<div class="empty-state">未找到匹配的模型</div>`;
    return;
  }

  grid.innerHTML = filtered.map((m, i) => `
    <a class="model-card" href="/pages/model.html?id=${m.id}" style="animation-delay:${i * .04}s">
      <div class="card-top">
        <div class="card-icon-wrap">
          <div class="card-icon ${m.category}">${CAT_ICONS[m.category] || ''}</div>
          <div>
            <div class="card-title">${m.name}</div>
            <div class="card-subtitle">${m.api_method} ${m.api_endpoint}</div>
          </div>
        </div>
        <span class="card-badge ${m.badge}">${m.badge === 'free' ? '免费' : '付费'}</span>
      </div>
      <div class="card-desc">${m.description}</div>
      <div class="card-bottom">
        <div class="card-meta">
          <span class="card-price ${m.badge === 'free' ? 'free' : ''}">${m.price_label}</span>
          <span class="card-info">${(m.tags || []).join(' · ')}</span>
        </div>
        <span class="card-btn">
          使用
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/></svg>
        </span>
      </div>
    </a>
  `).join('');
}

document.getElementById('categoryBar').addEventListener('click', e => {
  const tag = e.target.closest('.cat-tag');
  if (!tag) return;
  document.querySelectorAll('.cat-tag').forEach(t => t.classList.remove('active'));
  tag.classList.add('active');
  currentCat = tag.dataset.cat;
  renderModels();
});

let searchTimer;
document.getElementById('searchInput').addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(renderModels, 200);
});

const keyInput = document.getElementById('apiKeyInput');
const keyStatus = document.getElementById('keyStatus');
function loadKey() {
  const k = localStorage.getItem('modelhub_api_key') || '';
  keyInput.value = k;
  keyStatus.classList.toggle('ok', !!k);
}
function saveKey() {
  const k = keyInput.value.trim();
  if (!k) { showToast('请输入密钥后再保存', 'error'); return; }
  localStorage.setItem('modelhub_api_key', k);
  keyStatus.classList.add('ok');
  keyInput.type = 'password';
  showToast('密钥已保存', 'success');
}
loadKey();
function toggleKeyVisibility() {
  const isPassword = keyInput.type === 'password';
  keyInput.type = isPassword ? 'text' : 'password';
  document.getElementById('eyeOff').style.display = isPassword ? 'none' : 'block';
  document.getElementById('eyeOn').style.display = isPassword ? 'block' : 'none';
}
keyInput.addEventListener('keydown', e => { if (e.key === 'Enter') saveKey(); });

loadModels();
</script>
</body>
</html>
